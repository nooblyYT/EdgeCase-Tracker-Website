<!DOCTYPE html>
<html>
<head>
<title>EDGECRAFT SERVER</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>EDGECRAFT SERVER</header>

<div class="container">

<div class="card">
<h2>Server Status</h2>
<div id="status">Loading...</div>
<div id="uptime"></div>
</div>

<div class="card">
<h2>Players Online</h2>
<div id="players"></div>
</div>

<div class="card">
<h2>Server Info</h2>
<div id="version"></div>
<div id="motd"></div>
</div>

<div class="card">
<h2>Online Player List</h2>
<div id="playerlist"></div>
</div>

<div class="card">
<h2>Player Activity</h2>
<canvas id="playerChart"></canvas>
</div>

<div class="card">
<h2>Last Updated</h2>
<div id="updated"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
